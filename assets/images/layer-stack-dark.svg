<svg width="680" height="1060" viewBox="0 0 680 1060" xmlns="http://www.w3.org/2000/svg" role="img">
<title>FoundryOS architecture stack, 14 layers</title>
<desc>Modules feed Skills, owned by Agents, orchestrated by the Meta-Agent through Workflows, run through the Advanced Layer (Memory, Reflection, Critic, Planner, Knowledge Graph), woven with Brand Intelligence, triggered by Commands, passed through the preview-stage MCP Layer, producing Artifacts.</desc>
